<html>
    <head>
        <title>Organizador De Labores</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/Style.css">
    </head>
    <body>
        <header>
            <nav class="barrasuperior">
                <div class="logo">
                    <img src="img/logo.png" alt="Logo de Organizador de Labores" class="logo-img">
                </div>
                
                <div class="menu-items">
                    <button class="menu-btn" id="inicio">Acerca De Nosotros</button>
                    <button class="menu-btn" id="info">Accesos Rapidos</button>
                    <button class="menu-btn" id="contacto">Contacto</button>
                </div>
                
                <div class="botones">
                    <button class="btn" id="inicios">Iniciar Sesión</button>
                    <button class="btn" id="registro">Registrarse</button>
                </div>
            </nav>
        </header>

        <h1 class="titulo">Iniciar Sesión</h1>

        <div class="login-container">
            <form class="login-form" id="loginForm">
                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" required><br><br>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required><br><br>

                <label for="rol">Rol:</label>
                <select id="rol" name="rol" required>
                    <option value="">Selecciona tu rol</option>
                    <option value="tutor">Tutor</option>
                    <option value="hijo">Hijo</option>
                </select><br>
                <div class="btn2">
                    <button type="submit" class="btn" id="loginbtn">Iniciar Sesión</button>
                </div>
            </form>
        </div>  
        <script src="Scripts/Login.js"></script>
    </body>
</html>

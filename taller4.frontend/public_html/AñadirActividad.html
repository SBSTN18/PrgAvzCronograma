<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Crear Actividad - Organizador De Labores</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/Style.css">
    </head>
    <body>
        <header>
            <header>
            <nav class="barrasuperior" id="principal">
                <div class="logo">
                    <img src="img/logo.png" alt="Logo de Organizador de Labores" class="logo-img">
                </div>
                
                <div class="menu-items">
                    <button class="menu-btn" id="Consultar">Consultar Actividades</button>
                    <button class="menu-btn" id="añadir">Añadir Actividad</button>
                    <button class="menu-btn" id="ajustes">Ajustes</button>
                    
                </div>
                
                <div class="botones">
                    <img src="img/perfil.png" alt="Perfil" class="perfil-img">  
                    <h2 class="perfil">Juanito Perez</h2>
                </div>
            </nav>
        </header>

        <h1 class="titulo">Crear Nueva Actividad</h1>

        <div class="activity-container">
            <form id="create-activity-form">
                <div class="form-group">
                    <label for="titulo">Título de la Actividad:</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ej. Limpiar la sala" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tipoActividad">Tipo de Actividad:</label>
                        <select id="tipoActividad" name="tipoActividad" required>
                            <option value="">Selecciona un tipo</option>
                            <option value="Quehaceres y orden">Quehaceres y orden</option>
                            <option value="Limpieza profunda">Limpieza profunda</option>
                            <option value="Cocina y alimentos">Cocina y alimentos</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fechaInicio">Fecha inicio:</label>
                        <input type="date" id="fechaInicio" name="fechaInicio" required>
                    </div>

                    <div class="form-group">
                        <label for="fechaTerminacion">Fecha final:</label>
                        <input type="date" id="fechaTerminacion" name="fechaTerminacion" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="4" placeholder="Escribe las instrucciones detalladas de la actividad..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="idQuehacer">Id del que-hacer:</label>
                    <input type="text" id="idQuehacer" name="idQuehacer" placeholder="Ej. Quehacer 1" required>
                </div>
                <div class="form-group">
                    <label for="idTutor">Asignada por (Id del Tutor):</label>
                    <input type="text" id="idTutor" name="idTutor" placeholder="Ej. Tutor Principal" required>
                </div>
                <div class="form-group">
                    <label for="idHijo">Asignada a (Id del Hijo):</label>
                    <input type="text" id="idHijo" name="idHijo" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="menu-items">
                    <button type="button" class="menu-btn" id="guardar">Guardar Actividad</button>
                    <button type="button" class="menu-btn" id="cancelar">Cancelar</button>
                </div>
            </form>
        </div>
        <footer><br>
            <p>© 2026 Programacion avanzada. Universidad Distrital Francisco José de Caldas.</p>
        </footer>
        <script src="Scripts/AñadirActividad.js"></script>
    </body>
</html>
